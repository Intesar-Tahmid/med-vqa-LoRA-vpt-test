# Ablation A5 — Oracle router upper bound
# Purpose: establish an upper bound using ground-truth category labels at inference time
#          If A4 approaches A5, the learned router is near-optimal.
# Pool: split Gen (16) / Spec (24)
# Router: oracle (ground-truth category used directly, no learned MLP)
# LoRA: enabled
#
# Run:
#   python train_vpt.py \
#     --output_dir output/A5 \
#     --add_lora \
#     --use_oracle_router \
#     --gradient_checkpointing \
#     --model_name Qwen/Qwen2.5-VL-7B-Instruct

model_name:      Qwen/Qwen2.5-VL-7B-Instruct
output_dir:      output/A5
num_epochs:      3
batch_size:      4
num_gen_tokens:  16
num_spec_tokens: 24
add_lora:        true
use_oracle_router: true
lr_vpt:          2.0e-4
lr_router:       1.0e-3
lr_lora:         1.0e-4
lambda_router:   0.01
mu_cat:          0.1
gradient_checkpointing: true
