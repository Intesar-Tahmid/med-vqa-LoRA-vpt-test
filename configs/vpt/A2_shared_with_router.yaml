# Ablation A2 — Shared VPT + router, no LoRA
# Purpose: add the learned router but keep a single shared pool (gen=spec=20)
# Pool: shared (both pools same size; router output modulates blend weight)
# Router: enabled (trained with category supervision)
# LoRA: disabled
#
# Run:
#   python train_vpt.py \
#     --output_dir output/A2 \
#     --no-add_lora \
#     --num_gen_tokens 20 \
#     --num_spec_tokens 20 \
#     --model_name Qwen/Qwen2.5-VL-7B-Instruct

model_name:      Qwen/Qwen2.5-VL-7B-Instruct
output_dir:      output/A2
num_epochs:      3
batch_size:      4
num_gen_tokens:  20
num_spec_tokens: 20
add_lora:        false
use_oracle_router: false
lr_vpt:          2.0e-4
lr_router:       1.0e-3
lr_lora:         1.0e-4
lambda_router:   0.01
mu_cat:          0.1
gradient_checkpointing: true
