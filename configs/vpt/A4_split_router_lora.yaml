# Ablation A4 — Split + router + LoRA  (PROPOSED METHOD — full system)
# Purpose: full proposed method combining VPT with hierarchical routing and LoRA
# Pool: split Gen (16 tokens) / Spec (24 tokens)
# Router: enabled (learned from category labels)
# LoRA: enabled (rank=16, alpha=32, identical to baseline B0)
# Two-phase: epoch 1 freezes LoRA (VPT warmup), epoch 2+ joint training
#
# Run:
#   python train_vpt.py \
#     --output_dir output/A4 \
#     --add_lora \
#     --gradient_checkpointing \
#     --model_name Qwen/Qwen2.5-VL-7B-Instruct

model_name:      Qwen/Qwen2.5-VL-7B-Instruct
output_dir:      output/A4
num_epochs:      3
batch_size:      4
num_gen_tokens:  16
num_spec_tokens: 24
add_lora:        true
use_oracle_router: false
lr_vpt:          2.0e-4
lr_router:       1.0e-3
lr_lora:         1.0e-4
lambda_router:   0.01
mu_cat:          0.1
gradient_checkpointing: true
